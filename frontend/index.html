<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Doodle Marathon</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #1f2937;
            --text: #f9fafb;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-align: center;
            color: #d8b4fe;
            text-shadow: 2px 2px 0 #4c1d95;
            margin-top: 0;
        }

        /* Screens */
        #setupScreen, #gameScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
        }

        #setupScreen {
            display: flex;
        }

        /* Setup UI */
        .panel {
            background: #374151;
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            border: 4px solid #4ade80;
        }

        .canvas-container {
            position: relative;
            background: #f3f4f6;
            border-radius: 1rem;
            overflow: hidden;
            border: 4px dashed #9ca3af;
        }

        #drawCanvas {
            cursor: crosshair;
            background: white; 
            display: block;
        }

        .tools-config {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            background: #1f2937;
            padding: 10px;
            border-radius: 10px;
        }

        .tool-btn {
            background: #4b5563;
            color: white;
            border: 2px solid transparent;
            padding: 0.5rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
        }
        .tool-btn.active { border-color: #4ade80; background: #374151; }
        
        input[type="color"] {
            border: 2px solid #9ca3af;
            border-radius: 5px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        
        input[type="range"] {
            cursor: pointer;
        }

        .type-selector, .env-selector {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: #1f2937;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .type-btn, .env-btn {
            background: #4b5563;
            color: white;
            border: 3px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .type-btn.active, .env-btn.active { border-color: #4ade80; background: #374151; }

        .btn {
            font-family: 'Fredoka One', cursive;
            background: #4ade80;
            color: #064e3b;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #16a34a;
        }
        .btn:hover { background: #22c55e; transform: translateY(2px); box-shadow: 0 2px 0 #16a34a; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-clear { background: #f87171; color: #450a0a; box-shadow: 0 4px 0 #dc2626; margin-left: auto; }
        .btn-clear:hover { background: #ef4444; box-shadow: 0 2px 0 #dc2626; }
        
        .btn-undo { background: #fbbf24; color: #78350f; box-shadow: 0 4px 0 #d97706; padding: 0.5rem 0.8rem; font-size: 1rem; }
        .btn-undo:hover { background: #fcd34d; box-shadow: 0 2px 0 #d97706; }

        .btn-redo { background: #f59e0b; color: #78350f; box-shadow: 0 4px 0 #b45309; padding: 0.5rem 0.8rem; font-size: 1rem; }
        .btn-redo:hover { background: #fbbf24; box-shadow: 0 2px 0 #b45309; }

        .btn-resume { background: #3b82f6; color: white; box-shadow: 0 4px 0 #2563eb; width: 100%; font-size: 1.5rem; margin-top: 10px;}
        .btn-resume:hover { background: #60a5fa; box-shadow: 0 2px 0 #2563eb; }

        .btn-back { background: #6b7280; color: white; box-shadow: 0 4px 0 #4b5563; width: 100%; font-size: 1.2rem; margin-top: 5px; }
        .btn-back:hover { background: #9ca3af; box-shadow: 0 2px 0 #4b5563; }

        /* Game Screen */
        .world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #87CEEB;
            overflow: hidden;
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 150px;
            background: #4ade80; 
            display: flex;
            animation: scroll-ground 5s linear infinite;
        }

        @keyframes scroll-ground {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ground-deco {
            width: 50%; height: 10px; background: rgba(0,0,0,0.1); margin-top: 10px; border-radius: 5px;
        }

        /* Base Char Styles */
        .playerSprite, .flyingSprite {
            transition: filter 0.2s;
            cursor: pointer; 
        }

        /* The Walking Creature Flock */
        .playerSprite {
            position: absolute;
            width: 120px;
            height: 120px;
            z-index: 10;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            animation: run 0.4s infinite alternate;
            transform-origin: bottom center;
        }

        @keyframes run {
            0% { transform: translateY(0) scaleY(1) rotate(-5deg); }
            100% { transform: translateY(-20px) scaleY(1.05) rotate(5deg); }
        }

        /* The Flying Doodle Flock */
        .flyingSprite {
            position: absolute;
            width: 100px;
            height: 100px;
            z-index: 5;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            animation: fly 2s infinite ease-in-out;
            transform-origin: center center;
        }

        @keyframes fly {
            0% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(-3deg); }
        }

        /* Interaction Mode Hand */
        .hand-mode-active .playerSprite, 
        .hand-mode-active .flyingSprite {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text y="24" font-size="24">✋</text></svg>') 16 16, pointer !important;
        }
        
        .playerSprite:hover, .flyingSprite:hover {
            filter: drop-shadow(0 0 10px #fbbf24) brightness(1.2);
        }

        /* Specific Interactions & Random Behaviors */
        .anim-jump { animation: act-jump 0.6s cubic-bezier(0.2, 0.8, 0.3, 1) forwards !important; }
        .anim-spin { animation: act-spin 0.6s ease-in-out forwards !important; }
        .anim-fall { animation: act-fall 1s ease-in forwards !important; }
        .anim-dodge { animation: act-dodge 0.4s ease-out forwards !important; }

        @keyframes act-jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-200px) rotate(15deg) scale(1.1); }
            100% { transform: translateY(0); }
        }
        @keyframes act-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes act-fall {
            0% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(200px) rotate(90deg); opacity: 0.2; }
        }
        @keyframes act-dodge {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-80px) translateY(-50px) rotate(-20deg); }
            100% { transform: translateX(0) translateY(0); }
        }

        /* Environment Themes */
        .env-grass .world { background: #87CEEB; }
        .env-grass .ground { background: #4ade80; border-top: 10px solid #22c55e; }
        
        .env-snow .world { background: #e0f2fe; }
        .env-snow .ground { background: #ffffff; border-top: 10px solid #f1f5f9; }
        
        .env-beach .world { background: #0ea5e9; }
        .env-beach .ground { background: #fde047; border-top: 10px solid #facc15; }

        /* Char Action Menu */
        #charMenu {
            display: none;
            position: absolute;
            z-index: 9999;
            background: #1f2937;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #fbbf24;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #liveBadge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            font-family: 'Fredoka One', cursive;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
            z-index: 100;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. Setup Screen -->
    <div id="setupScreen">
        <h1>Doodle Marathon</h1>
        <div class="panel">
            
            <div class="tools-config">
                <button class="tool-btn active" data-tool="brush">🖌️ Brush</button>
                <button class="tool-btn" data-tool="fill" title="Paint Bucket">🪣 Fill</button>
                <button class="tool-btn" data-tool="erase">🧽 Erase</button>
                <button id="undoBtn" class="btn btn-undo" title="Undo Last Stroke">↩️ Undo</button>
                <button id="redoBtn" class="btn btn-redo" title="Redo">↪️ Redo</button>
                
                <input type="color" id="colorPicker" value="#111827" title="Choose Color">
                
                <label style="color: white; font-family: 'Fredoka One', cursive; margin-left: 10px;">Size:</label>
                <input type="range" id="sizeSlider" min="2" max="40" value="6">
                
                <button id="clearCanvasBtn" class="btn btn-clear">Clear</button>
            </div>
            
            <div class="canvas-container">
                <canvas id="drawCanvas" width="450" height="300"></canvas>
            </div>

            <div style="display: flex; gap: 20px; width: 100%; justify-content: center;">
                <div class="type-selector">
                    <span style="color:white; font-family: 'Fredoka One', cursive;">Movement:</span>
                    <button class="type-btn active" data-type="walking">🚶 Run</button>
                    <button class="type-btn" data-type="flying">🦅 Fly</button>
                </div>
                <div class="env-selector">
                    <span style="color:white; font-family: 'Fredoka One', cursive;">World:</span>
                    <button class="env-btn active" data-env="grass">🌲</button>
                    <button class="env-btn" data-env="snow">❄️</button>
                    <button class="env-btn" data-env="beach">🏖️</button>
                </div>
            </div>

            <button id="startBtn" class="btn" style="width: 100%; font-size: 1.5rem; margin-top: 10px;">ADD TO MARATHON! 🏃</button>
            <button id="resumeBtn" class="btn btn-resume" style="display:none;">▶️ RESUME EXISTING MARATHON</button>
            <button id="backToMarathonBtn" class="btn btn-back" style="display:none;">⬅️ View Marathon Without Adding</button>
        </div>
    </div>

    <!-- 2. Game Screen -->
    <div id="gameScreen">
        <div class="world" id="gameWorld">
            
            <!-- Multiplayer Live Badge -->
            <div id="liveBadge">🔴 LIVE</div>

            <div style="position: absolute; top: 20px; left: 20px; z-index: 100; display:flex; gap:15px;">
                <button id="addCharacterBtn" class="btn">➕ Add Doodle</button>
                <button id="handModeBtn" class="btn" style="background:#fbbf24; color:#78350f; box-shadow: 0 4px 0 #d97706;" title="Makes characters dodge your cursor if hovering over them!">🤚 Hand Mode: OFF</button>
            </div>
            
            <div class="ground">
                <div style="width: 50%; position: relative;">
                    <div class="ground-deco" style="top:20px; left:10%; width: 50px;"></div>
                    <div class="ground-deco" style="top:50px; left:40%; width: 30px;"></div>
                    <div class="ground-deco" style="top:80px; left:70%; width: 80px;"></div>
                </div>
                <div style="width: 50%; position: relative;">
                    <div class="ground-deco" style="top:20px; left:10%; width: 50px;"></div>
                    <div class="ground-deco" style="top:50px; left:40%; width: 30px;"></div>
                    <div class="ground-deco" style="top:80px; left:70%; width: 80px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Char action menu -->
    <div id="charMenu">
        <button id="menuEditBtn" class="btn" style="padding: 5px 15px;">✏️ Edit</button>
        <button id="menuDelBtn" class="btn btn-clear" style="padding: 5px 15px; margin:0;">🗑️ Delete</button>
        <button id="menuCancelBtn" class="btn" style="background:#9ca3af; box-shadow:0 4px 0 #4b5563; padding: 5px 15px;">✖</button>
    </div>

    <script>
        // Placeholder for Render environment injection (via inject-env.js)
        window.BACKEND_API_URL = null;

        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        
        let isDrawing = false;
        let currentTool = 'brush'; 
        let brushColor = '#111827';
        let brushSize = 6;
        let currentCharType = 'walking';
        let currentEnv = 'grass';
        let editingIndex = -1;
        
        let undoHistory = [];
        let redoHistory = [];
        const maxHistory = 30;

        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:8085' 
            : (window.BACKEND_API_URL || 'https://doodle-marathon.onrender.com'); 

        // Setup unique device ID for ownership
        let myClientId = localStorage.getItem('doodleClientId');
        if (!myClientId) {
            myClientId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('doodleClientId', myClientId);
        }

        function saveHistory() {
            undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if (undoHistory.length > maxHistory) undoHistory.shift();
            redoHistory = []; 
        }

        // --- MULTIPLAYER STORAGE ENGINE --- //
        let playersData = [];

        async function loadFlock() {
            try {
                const res = await fetch(API_BASE_URL + '/api/doodles');
                if(res.ok) {
                    playersData = await res.json();
                } else {
                    playersData = JSON.parse(localStorage.getItem('doodleMarathonDB')) || [];
                }
            } catch(e) {
                playersData = JSON.parse(localStorage.getItem('doodleMarathonDB')) || [];
            }
            updateResumeButtonVisibility();
        }

        async function saveFlockToServer(newDoodle) {
            try {
                await fetch(API_BASE_URL + '/api/doodles', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(newDoodle)
                });
            } catch(e) {
                playersData.push(newDoodle);
                localStorage.setItem('doodleMarathonDB', JSON.stringify(playersData));
            }
            await loadFlock();
        }

        async function removeFromServer(index) {
            try {
                const res = await fetch(API_BASE_URL + '/api/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({index: index, clientId: myClientId})
                });
                if(!res.ok) {
                    alert("Unauthorized: You can only delete your own doodles!");
                    return;
                }
            } catch(e) {
                playersData.splice(index, 1);
                localStorage.setItem('doodleMarathonDB', JSON.stringify(playersData));
            }
            await loadFlock();
        }
        
        loadFlock(); // Load immediately on page open

        function updateResumeButtonVisibility() {
            if(playersData.length > 0) {
                document.getElementById('resumeBtn').style.display = 'block';
                document.getElementById('backToMarathonBtn').style.display = 'block';
            } else {
                document.getElementById('resumeBtn').style.display = 'none';
                document.getElementById('backToMarathonBtn').style.display = 'none';
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- DRAWING LOGIC --- //
        canvas.addEventListener('mousedown', startP);
        canvas.addEventListener('mousemove', drawP);
        window.addEventListener('mouseup', stopP);
        
        canvas.addEventListener('touchstart', startT, {passive: false});
        canvas.addEventListener('touchmove', drawT, {passive: false});
        window.addEventListener('touchend', stopP);

        function startP(e) {
            saveHistory(); 
            if (currentTool === 'fill') {
                floodFill(e.offsetX, e.offsetY, brushColor);
                return;
            }
            isDrawing = true;
            draw(e.offsetX, e.offsetY);
        }
        function drawP(e) {
            if (!isDrawing) return;
            draw(e.offsetX, e.offsetY);
        }
        function startT(e) {
            saveHistory(); 
            if (currentTool === 'fill') {
                const rect = canvas.getBoundingClientRect();
                floodFill(Math.floor(e.touches[0].clientX - rect.left), Math.floor(e.touches[0].clientY - rect.top), brushColor);
                return;
            }
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            draw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }
        function drawT(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            draw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }
        function stopP() {
            if (isDrawing) {
                isDrawing = false;
                ctx.beginPath();
            }
        }

        function draw(x, y) {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = brushSize;
            
            if (currentTool === 'erase') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = brushColor;
            }
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function floodFill(startX, startY, hexColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const getIdx = (x, y) => (y * canvas.width + x) * 4;
            
            const startIdx = getIdx(startX, startY);
            const startR = data[startIdx];
            const startG = data[startIdx+1];
            const startB = data[startIdx+2];
            const startA = data[startIdx+3];

            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const a = 255;

            if (startR === r && startG === g && startB === b && startA === a) return;

            const matchStartColor = (idx) => {
                if (startA === 0) return data[idx+3] === 0;
                return (data[idx] === startR && data[idx+1] === startG && data[idx+2] === startB && data[idx+3] === startA);
            };

            const setColor = (idx) => {
                data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = a;
            };

            let pixelStack = [[startX, startY]];
            
            while(pixelStack.length) {
                let pos = pixelStack.pop();
                let x = pos[0];
                let y = pos[1];
                let idx = getIdx(x, y);
                
                while(y-- >= 0 && matchStartColor(idx)) {
                    idx -= canvas.width * 4;
                }
                idx += canvas.width * 4;
                y++;
                
                let reachLeft = false;
                let reachRight = false;
                
                while(y++ < canvas.height - 1 && matchStartColor(idx)) {
                    setColor(idx);
                    if(x > 0) {
                        if(matchStartColor(idx - 4)) {
                            if(!reachLeft) {
                                pixelStack.push([x - 1, y]);
                                reachLeft = true;
                            }
                        } else if(reachLeft) { reachLeft = false; }
                    }
                    if(x < canvas.width - 1) {
                        if(matchStartColor(idx + 4)) {
                            if(!reachRight) {
                                pixelStack.push([x + 1, y]);
                                reachRight = true;
                            }
                        } else if(reachRight) { reachRight = false; }
                    }
                    idx += canvas.width * 4;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // --- BUTTON LISTENERS --- //
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.getAttribute('data-tool');
            });
        });
        
        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoHistory.length > 0) {
                redoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                const historyState = undoHistory.pop();
                ctx.putImageData(historyState, 0, 0);
            }
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoHistory.length > 0) {
                undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                const redoState = redoHistory.pop();
                ctx.putImageData(redoState, 0, 0);
            }
        });

        colorPicker.addEventListener('input', (e) => { brushColor = e.target.value; });
        sizeSlider.addEventListener('input', (e) => { brushSize = e.target.value; });
        document.getElementById('clearCanvasBtn').addEventListener('click', () => {
            saveHistory();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCharType = btn.getAttribute('data-type');
            });
        });
        document.querySelectorAll('.env-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEnv = btn.getAttribute('data-env');
            });
        });

        // --- APP STATES AND LOGIC --- //
        const setupScreen = document.getElementById('setupScreen');
        const gameScreen = document.getElementById('gameScreen');

        document.getElementById('addCharacterBtn').addEventListener('click', () => {
            editingIndex = -1; 
            undoHistory = []; 
            redoHistory = [];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            document.getElementById('charMenu').style.display = 'none'; 
            
            gameScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
        });

        document.getElementById('resumeBtn').addEventListener('click', () => {
            setupScreen.style.display = 'none';
            startGame();
        });

        document.getElementById('backToMarathonBtn').addEventListener('click', () => {
            setupScreen.style.display = 'none';
            startGame();
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            const dataUrl = canvas.toDataURL('image/png');
            
            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            const isEmpty = !imgData.some((v, idx) => idx % 4 === 3 && v !== 0);
            
            if(!isEmpty) {
                document.getElementById('startBtn').innerText = "SYNCING TO SERVER...";
                const newDoodle = { imgSrc: dataUrl, type: currentCharType, clientId: myClientId };
                if(editingIndex >= 0) {
                    await removeFromServer(editingIndex);
                }
                await saveFlockToServer(newDoodle);
                document.getElementById('startBtn').innerText = "ADD TO MARATHON! 🏃♂️";
            }

            setupScreen.style.display = 'none';
            startGame();
        });

        // --- GAME INTERACTION STATE -- //
        let isHandMode = false;
        document.getElementById('handModeBtn').addEventListener('click', (e) => {
            isHandMode = !isHandMode;
            e.target.innerText = isHandMode ? "🤚 Hand Mode: ON" : "🤚 Hand Mode: OFF";
            e.target.style.background = isHandMode ? "#f59e0b" : "#fbbf24";
            
            if (isHandMode) {
                document.getElementById('gameWorld').classList.add('hand-mode-active');
            } else {
                document.getElementById('gameWorld').classList.remove('hand-mode-active');
            }
        });

        // --- GAME ENGINE --- //
        let animLoop;
        let syncLoop;
        let selectedMenuIndex = -1;
        
        function startGame() {
            gameScreen.style.display = 'block';
            document.body.className = `env-${currentEnv}`;
            document.getElementById('charMenu').style.display = 'none';
            
            renderFlock();
            
            // MULTIPLAYER LIVE SYNC LOOP
            if (syncLoop) clearInterval(syncLoop);
            syncLoop = setInterval(async () => {
                if(gameScreen.style.display === 'block') {
                    const oldStr = JSON.stringify(playersData.map(p => p.imgSrc.substring(0,50)));
                    await loadFlock();
                    const newStr = JSON.stringify(playersData.map(p => p.imgSrc.substring(0,50)));
                    if(oldStr !== newStr) {
                        renderFlock(); // A new player joined the marathon online!
                    }
                }
            }, 3000); 

            // Random Idle Actions
            if (animLoop) clearInterval(animLoop);
            animLoop = setInterval(() => {
                const sprites = document.querySelectorAll('.playerSprite, .flyingSprite');
                if (sprites.length === 0) return;
                
                sprites.forEach(sprite => {
                    if (Math.random() > 0.90) { 
                        const acts = ['anim-jump', 'anim-spin', 'anim-fall'];
                        const act = acts[Math.floor(Math.random() * acts.length)];
                        
                        if(!sprite.classList.contains(act)) {
                            sprite.classList.add(act);
                            const duration = (act === 'anim-fall') ? 1000 : 600;
                            setTimeout(() => { sprite.classList.remove(act); }, duration);
                        }
                    }
                });
            }, 3000);
        }

        function renderFlock() {
            document.querySelectorAll('.playerSprite, .flyingSprite').forEach(p => p.remove());

            let walkerIndex = 0;
            playersData.forEach((playerObj, arrayIndex) => {
                const player = document.createElement('div');
                player.style.backgroundImage = `url(${playerObj.imgSrc})`;
                player.dataset.index = arrayIndex;
                
                if (playerObj.type === 'flying') {
                    player.classList.add('flyingSprite');
                    const randomX = Math.floor(Math.random() * window.innerWidth * 0.8) + 50; 
                    const randomY = Math.floor(Math.random() * 200) + 300; 
                    player.style.left = `${randomX}px`;
                    player.style.bottom = `${randomY}px`;
                    player.style.zIndex = Math.floor(100 - arrayIndex); 
                    player.style.animationDelay = `${(Math.random() * 1.5).toFixed(2)}s`;
                } else {
                    player.classList.add('playerSprite');
                    const cols = Math.max(1, Math.floor((window.innerWidth - 100) / 140));
                    const row = Math.floor(walkerIndex / cols); 
                    const col = walkerIndex % cols;
                    walkerIndex++;

                    const stagger = (row % 2) * 70;
                    const randomXVariation = (Math.random() - 0.5) * 20; 
                    const posX = 50 + (col * 140) + stagger + randomXVariation;
                    const posY = 120 + (row * 60) + (Math.random() - 0.5) * 10; 
                    
                    player.style.left = `${posX}px`;
                    player.style.bottom = `${posY}px`;
                    player.style.zIndex = Math.floor(1000 - posY); 
                    player.style.animationDelay = `${(Math.random() * 0.4).toFixed(3)}s`;
                }
                
                // --- HOVER DODGE --- //
                player.addEventListener('mouseenter', () => {
                    if(!isHandMode) return;
                    if(!player.classList.contains('anim-dodge') && !player.classList.contains('anim-jump')) {
                        const acts = ['anim-dodge', 'anim-jump', 'anim-spin'];
                        const act = acts[Math.floor(Math.random() * acts.length)];
                        player.classList.add(act);
                        setTimeout(() => { player.classList.remove(act); }, 600);
                    }
                });

                // --- ALWAYS CLICK MENU --- //
                player.addEventListener('click', (e) => {
                    if (isHandMode) return; // Ignore clicks if character dodging is active

                    if (playerObj.clientId && playerObj.clientId !== myClientId) {
                        alert("Hold up! You can't edit or delete someone else's doodle!");
                        return;
                    }
                    e.stopPropagation();
                    const menu = document.getElementById('charMenu');
                    menu.style.display = 'flex';
                    menu.style.left = `${e.clientX + 20}px`;
                    menu.style.top = `${e.clientY - 40}px`;
                    selectedMenuIndex = parseInt(player.dataset.index);
                });

                document.getElementById('gameWorld').appendChild(player);
            });
        }
        
        // --- MENU INTERACTION ACTIONS --- //
        document.getElementById('menuCancelBtn').addEventListener('click', () => {
            document.getElementById('charMenu').style.display = 'none';
        });

        document.getElementById('menuDelBtn').addEventListener('click', async () => {
            if(selectedMenuIndex >= 0 && selectedMenuIndex < playersData.length) {
                const btn = document.getElementById('menuDelBtn');
                btn.innerText = "⏳";
                await removeFromServer(selectedMenuIndex);
                btn.innerText = "🗑️ Delete";
                renderFlock(); 
                document.getElementById('charMenu').style.display = 'none';
            }
        });

        document.getElementById('menuEditBtn').addEventListener('click', () => {
            if(selectedMenuIndex >= 0 && selectedMenuIndex < playersData.length) {
                editingIndex = selectedMenuIndex;
                const playerObj = playersData[selectedMenuIndex];
                
                ctx.clearRect(0,0, canvas.width, canvas.height);
                undoHistory = []; // Reset history for edit
                redoHistory = [];
                
                const img = new Image();
                img.onload = () => { ctx.drawImage(img, 0, 0); };
                img.src = playerObj.imgSrc;
                
                // Update toggles to match
                document.querySelectorAll('.type-btn').forEach(btn => {
                    if(btn.getAttribute('data-type') === playerObj.type) {
                        btn.click();
                    }
                });

                document.getElementById('charMenu').style.display = 'none';
                gameScreen.style.display = 'none';
                setupScreen.style.display = 'flex';
            }
        });

        // Hide menu if clicked elsewhere
        document.body.addEventListener('click', (e) => {
            if(e.target.id !== 'charMenu' && !e.target.closest('#charMenu') && !e.target.classList.contains('playerSprite') && !e.target.classList.contains('flyingSprite')) {
                document.getElementById('charMenu').style.display = 'none';
            }
        });
    </script>
</body>
</html>
